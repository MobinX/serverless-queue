name: CI

# Runs on every branch push and PR — catches regressions before merge.
# The `main` branch is covered by the Release workflow instead.
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify dist exports
        run: |
          echo "── dist contents ──"
          ls -lh dist/
          echo "── CJS exports ──"
          node -e "const m = require('./dist/index.cjs'); console.log(Object.keys(m).join(', '))"
